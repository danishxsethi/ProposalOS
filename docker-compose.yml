version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: proposal_engine_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: proposal_engine
    ports:
      - "5435:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

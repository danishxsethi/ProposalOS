substitutions:
  _COMMIT_SHA: 'manual'

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/proposal-engine/app:$_COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/proposal-engine/app:latest'
      - '.'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/proposal-engine/app:$_COMMIT_SHA'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'proposal-engine'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/proposal-engine/app:$_COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=120s'
      - '--add-cloudsql-instances=ixcc-486621:us-central1:proposal-engine-db'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=us-central1'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,GOOGLE_PLACES_API_KEY=GOOGLE_PLACES_API_KEY:latest,GOOGLE_PAGESPEED_API_KEY=GOOGLE_PAGESPEED_API_KEY:latest,SERP_API_KEY=SERP_API_KEY:latest,API_KEY=API_KEY:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/proposal-engine/app:$_COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/proposal-engine/app:latest'

options:
  machineType: 'N1_HIGHCPU_8'

